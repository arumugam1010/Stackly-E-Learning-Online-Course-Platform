<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Register Account - STACKLY eLEARNING</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Outfit:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />

    <!-- Icon Font Stylesheet -->
    <link href="css/all.min.css" rel="stylesheet" />
    <link href="css/bootstrap-icons.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />

    <style>
      :root {
        --primary-theme: #4a72b0;
        --primary-theme-hover: #6fa0d0;
        --dark-theme: #0f172a;
        --card-bg: #1e293b;
        --border-color: #334155;
        --white: #ffffff;
        --gray: #94a3b8;
        --light-gray: #f1f5f9;
        --input-bg: #0f172a;
      }
      body {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Inter", sans-serif;
        background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
        margin: 0;
        padding: 20px;
        color: var(--white);
        position: relative;
        overflow-x: hidden;
      }
      .back-to-home {
        position: absolute;
        top: 25px;
        left: 25px;
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        color: var(--white);
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        z-index: 100;
      }
      .back-to-home:hover {
        background-color: var(--primary-theme);
        border-color: var(--primary-theme);
        color: var(--white);
      }
      .auth-card {
        width: 100%;
        max-width: 480px;
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        z-index: 10;
        animation: fadeIn 0.4s ease-in-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .logo-container {
        text-align: center;
        margin-bottom: 25px;
      }
      .logo-container img {
        height: 38px;
        object-fit: contain;
      }
      .auth-header {
        text-align: center;
        margin-bottom: 30px;
      }
      .auth-title {
        font-family: "Outfit", sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 8px;
      }
      .auth-desc {
        font-size: 14px;
        color: var(--gray);
        margin: 0;
      }
      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .form-label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 500;
        color: var(--white);
      }
      .form-input, .form-select {
        width: 100%;
        height: 46px;
        background-color: var(--input-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0 16px;
        font-size: 14px;
        color: var(--white);
        outline: none;
        transition: all 0.25s ease;
      }
      .form-input:focus, .form-select:focus {
        border-color: var(--primary-theme);
        box-shadow: 0 0 0 3px rgba(59, 61, 184, 0.15);
      }
      .form-select option {
        background-color: var(--card-bg);
        color: var(--white);
      }
      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .checkbox-input {
        width: 16px;
        height: 16px;
        accent-color: var(--primary-theme);
        cursor: pointer;
      }
      .checkbox-label {
        font-size: 13px;
        color: var(--gray);
        cursor: pointer;
      }
      .forgot-link {
        font-size: 13px;
        color: var(--primary-theme);
        text-decoration: none;
        transition: color 0.2s;
      }
      .forgot-link:hover {
        color: var(--primary-theme-hover);
        text-decoration: underline;
      }
      .btn-submit {
        width: 100%;
        height: 48px;
        background: linear-gradient(135deg, var(--primary-theme) 0%, var(--primary-theme-hover) 100%);
        border: none;
        border-radius: 8px;
        color: var(--white);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        box-shadow: 0 4px 6px -1px rgba(59, 61, 184, 0.2);
      }
      .btn-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(59, 61, 184, 0.3);
      }
      .toggle-text {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
        color: var(--gray);
      }
      .toggle-link {
        color: var(--primary-theme);
        text-decoration: none;
        font-weight: 600;
        margin-left: 5px;
        transition: color 0.2s;
      }
      .toggle-link:hover {
        color: var(--primary-theme-hover);
        text-decoration: underline;
      }

      /* Mobile responsiveness overrides */
      @media (max-width: 600px) {
        body {
          padding: 15px;
        }
        .back-to-home {
          position: static;
          display: flex;
          margin-bottom: 20px;
          align-self: flex-start;
          width: fit-content;
        }
        .auth-card {
          padding: 25px 20px;
        }
        .auth-title {
          font-size: 24px;
        }
      }
      /* Animated Background Elements */
      .bg-bubbles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        overflow: hidden;
        margin: 0;
        padding: 0;
        pointer-events: none;
      }
      .bg-bubbles li {
        position: absolute;
        list-style: none;
        display: block;
        color: rgba(255, 255, 255, 0.05); /* very subtle white */
        bottom: -150px;
        animation: floatUp 25s infinite linear;
        transition-timing-function: ease-in-out;
        font-size: 24px;
      }
      /* Custom positions, sizes, animations and delays for each icon */
      .bg-bubbles li:nth-child(1) { left: 10%; font-size: 30px; animation-duration: 18s; }
      .bg-bubbles li:nth-child(2) { left: 20%; font-size: 40px; animation-delay: 2s; animation-duration: 22s; }
      .bg-bubbles li:nth-child(3) { left: 25%; font-size: 25px; animation-delay: 4s; }
      .bg-bubbles li:nth-child(4) { left: 40%; font-size: 35px; animation-duration: 20s; }
      .bg-bubbles li:nth-child(5) { left: 70%; font-size: 50px; }
      .bg-bubbles li:nth-child(6) { left: 80%; font-size: 30px; animation-delay: 3s; animation-duration: 15s; }
      .bg-bubbles li:nth-child(7) { left: 32%; font-size: 45px; animation-delay: 7s; }
      .bg-bubbles li:nth-child(8) { left: 55%; font-size: 28px; animation-delay: 15s; animation-duration: 28s; }
      .bg-bubbles li:nth-child(9) { left: 90%; font-size: 38px; animation-delay: 2s; }
      .bg-bubbles li:nth-child(10) { left: 85%; font-size: 42px; animation-delay: 5s; animation-duration: 17s; }

      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.8;
        }
        90% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(-120vh) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- Animated background icons -->
    <ul class="bg-bubbles">
      <li><i class="fa fa-graduation-cap"></i></li>
      <li><i class="fa fa-book-open"></i></li>
      <li><i class="fa fa-lightbulb"></i></li>
      <li><i class="fa fa-pencil-alt"></i></li>
      <li><i class="fa fa-code"></i></li>
      <li><i class="fa fa-laptop-code"></i></li>
      <li><i class="fa fa-award"></i></li>
      <li><i class="fa fa-user-graduate"></i></li>
      <li><i class="fa fa-brain"></i></li>
      <li><i class="fa fa-microscope"></i></li>
    </ul>

    <div class="auth-card">
      <!-- 1. Sign In Form (Hidden by default on register page) -->
      <form id="login-form" class="form-auth" style="display: none;">
        <div class="logo-container">
          <img src="img/logo-stackly.webp" alt="Logo" />
        </div>
        <div class="auth-header">
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-desc">Access your client portal or design dashboard.</p>
        </div>

        <div id="login-alert" class="alert alert-danger d-none py-2 px-3 text-center small mb-3"></div>

        <div class="form-group">
          <label class="form-label" for="login-role">Select Role</label>
          <select id="login-role" class="form-select text-white px-3" required>
            <option value="" disabled selected>Select Your Role</option>
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="john@example.com" autocomplete="off" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required />
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="checkbox-group">
            <input type="checkbox" id="remember-me" class="checkbox-input" />
            <label for="remember-me" class="checkbox-label">Remember Me</label>
          </div>
          <a href="404.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-submit">Access Portal</button>

        <p class="toggle-text">
          Don't have an account? <a href="#" id="to-signup" class="toggle-link">Sign Up</a>
        </p>
        <p class="text-center mt-3 mb-0">
          <a href="index.html" class="toggle-link" style="font-size: 13px; opacity: 0.8; font-weight: 500;">
            <i class="fa fa-arrow-left me-1"></i> Back to Home
          </a>
        </p>
      </form>

      <!-- 2. Sign Up Form (Visible by default on register page) -->
      <form id="signup-form" class="form-auth">
        <div class="logo-container">
          <img src="img/logo-stackly.webp" alt="Logo" />
        </div>
        <div class="auth-header">
          <h2 class="auth-title">Create Account</h2>
          <p class="auth-desc">Enter your personal details to start your learning journey.</p>
        </div>

        <div id="signup-alert" class="alert alert-danger d-none py-2 px-3 text-center small mb-3"></div>
        <div id="signup-success" class="alert alert-success d-none py-2 px-3 text-center small mb-3"></div>

        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-role">Select Role</label>
          <select id="signup-role" class="form-select text-white px-3" required>
            <option value="" disabled selected>Select Your Role</option>
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address</label>
          <input type="email" id="signup-email" class="form-input" placeholder="john@example.com" autocomplete="off" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-input" placeholder="••••••••" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-confirm-password">Confirm Password</label>
          <input type="password" id="signup-confirm-password" class="form-input" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-submit">Sign Up</button>

        <p class="toggle-text">
          Already have an account? <a href="#" id="to-signin" class="toggle-link">Sign In</a>
        </p>
        <p class="text-center mt-3 mb-0">
          <a href="index.html" class="toggle-link" style="font-size: 13px; opacity: 0.8; font-weight: 500;">
            <i class="fa fa-arrow-left me-1"></i> Back to Home
          </a>
        </p>
      </form>
    </div>

    <!-- Script library -->
    <script src="js/jquery-3.4.1.min.js"></script>
    <script>
      $(document).ready(function () {
        function showSignUp() {
          $("#login-form").fadeOut(200, function() {
            $("#signup-form").fadeIn(200);
          });
        }

        function showSignIn() {
          $("#signup-form").fadeOut(200, function() {
            $("#login-form").fadeIn(200);
          });
        }

        $("#to-signup").on("click", function(e) {
          e.preventDefault();
          showSignUp();
        });

        $("#to-signin").on("click", function(e) {
          e.preventDefault();
          showSignIn();
        });

        // Helper to extract clean name from email
        function getNameFromEmail(email) {
          var namePart = email.split("@")[0];
          namePart = namePart.replace(/[._+]/g, " ");
          return namePart.replace(/\b\w/g, function (char) {
            return char.toUpperCase();
          });
        }

        // Seed default users if localStorage is empty
        var users = JSON.parse(localStorage.getItem("users")) || [];
        if (users.length === 0) {
          users.push({
            name: "Student Test",
            email: "student@elearning.com",
            password: "Student123!",
            role: "student",
          });
          users.push({
            name: "Instructor Test",
            email: "instructor@elearning.com",
            password: "Instructor123!",
            role: "instructor",
          });
          users.push({
            name: "Admin Test",
            email: "admin@elearning.com",
            password: "Admin123!",
            role: "admin",
          });
          localStorage.setItem("users", JSON.stringify(users));
        }

        // Remember me logic is disabled by user request to not show last logged email

        $("#signup-name").on("input", function () {
          var val = $(this).val();
          $(this).val(val.replace(/[0-9]/g, ""));
        });

        // Auth validations & LocalStorage
        $("#signup-form").on("submit", function (e) {
          e.preventDefault();
          $("#signup-alert").addClass("d-none");
          $("#signup-success").addClass("d-none");

          var name = $("#signup-name").val().trim();
          var email = $("#signup-email").val().trim();
          var password = $("#signup-password").val();
          var confirmPassword = $("#signup-confirm-password").val();
          var role = $("#signup-role").val();

          // Validations
          if (/\d/.test(name)) {
            $("#signup-alert")
              .text("Name should not contain numbers.")
              .removeClass("d-none");
            return;
          }

          var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(email)) {
            $("#signup-alert")
              .text("Please enter a valid email address.")
              .removeClass("d-none");
            return;
          }

          // Password validation: 8+ chars, upper, lower, digit, symbol
          var passRegex =
            /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
          if (!passRegex.test(password)) {
            $("#signup-alert")
              .html(
                "Password must be at least 8 characters long, contain an uppercase letter, a lowercase letter, a digit, and a special character (@$!%*?&).",
              )
              .removeClass("d-none");
            return;
          }

          // Confirm password validation
          if (password !== confirmPassword) {
            $("#signup-alert")
              .text("Passwords do not match.")
              .removeClass("d-none");
            return;
          }

          // Check duplicate
          var users = JSON.parse(localStorage.getItem("users")) || [];
          var exists = users.some((u) => u.email === email);
          if (exists) {
            $("#signup-alert")
              .text("An account with this email already exists.")
              .removeClass("d-none");
            return;
          }

          // Register user
          users.push({
            name: name,
            email: email,
            password: password,
            role: role,
          });
          localStorage.setItem("users", JSON.stringify(users));

          $("#signup-success")
            .text("Registration successful! Switching to Login...")
            .removeClass("d-none");

          // Clear inputs
          $("#signup-name").val("");
          $("#signup-email").val("");
          $("#signup-password").val("");
          $("#signup-confirm-password").val("");
          $("#signup-role").val("");

          // Auto switch to sign in after 2 seconds
          setTimeout(function () {
            showSignIn();
          }, 2000);
        });

        $("#login-form").on("submit", function (e) {
          e.preventDefault();
          $("#login-alert").addClass("d-none");

          var email = $("#login-email").val().trim();
          var password = $("#login-password").val();
          var role = $("#login-role").val();

          // Enforce Password complexity validation on login page
          var passRegex =
            /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
          if (!passRegex.test(password)) {
            $("#login-alert")
              .html(
                "Password must be at least 8 characters long, contain an uppercase letter, a lowercase letter, a digit, and a special character (@$!%*?&).",
              )
              .removeClass("d-none");
            return;
          }

          var users = JSON.parse(localStorage.getItem("users")) || [];
          var user = users.find(
            (u) => u.email === email && u.password === password,
          );

          if (!user) {
            // Mock dynamic login user on the fly using dynamic name extraction
            var extractedName = getNameFromEmail(email);
            user = {
              name: extractedName,
              email: email,
              password: password,
              role: role,
            };
          } else {
            // Force role to selected role from dropdown
            user.role = role;
          }

          // Remember me storage logic
          if ($("#remember-me").is(":checked")) {
            localStorage.setItem("rememberedEmail", email);
            localStorage.setItem("rememberedPassword", password);
          } else {
            localStorage.removeItem("rememberedEmail");
            localStorage.removeItem("rememberedPassword");
          }

          // Set active session
          localStorage.setItem("currentUser", JSON.stringify(user));

          // Redirect to dashboard
          window.location.href = "dashboard.html";
        });
      });
    </script>
  </body>
</html>
