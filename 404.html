<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Page Not Found - STACKLY eLEARNING</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Outfit:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />

    <!-- Icon Font Stylesheet -->
    <link href="css/all.min.css" rel="stylesheet" />
    <link href="css/bootstrap-icons.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet" />

    <style>
      .animated-bg {
        background: linear-gradient(-45deg, #06bbcc, #181d38, #059ea9, #2b3054);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        position: relative;
        overflow: hidden;
      }
      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        z-index: 10;
        position: relative;
      }
      /* Floating e-learning icons */
      .floating-icon {
        position: absolute;
        color: rgba(255, 255, 255, 0.08);
        bottom: -100px;
        animation: floatUp 12s infinite ease-in-out;
        z-index: 1;
        pointer-events: none;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        30% {
          opacity: 0.7;
        }
        70% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(-115vh) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <!-- Spinner Start -->
    <div
      id="spinner"
      class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center"
    >
      <div
        class="spinner-border text-primary"
        style="width: 3rem; height: 3rem"
        role="status"
      >
        <span class="sr-only">Loading...</span>
      </div>
    </div>
    <!-- Spinner End -->

    <!-- 404 Full Screen Centered Start -->
    <div
      class="vh-100 d-flex align-items-center justify-content-center animated-bg"
    >
      <!-- Floating E-Learning Icons -->
      <div class="floating-icon" style=" left: 8%;   font-size: 40px;animation-delay: 0s; animation-duration: 14s;
        "
      >
        <i class="fa fa-graduation-cap"></i>
      </div>
      <div
        class="floating-icon"
        style="
          left: 20%;
          font-size: 55px;
          animation-delay: 2s;
          animation-duration: 18s;
        "
      >
        <i class="fa fa-book"></i>
      </div>
      <div
        class="floating-icon"
        style="
          left: 35%;
          font-size: 35px;
          animation-delay: 4s;
          animation-duration: 13s;
        "
      >
        <i class="fa fa-laptop-code"></i>
      </div>
      <div
        class="floating-icon"
        style="
          left: 55%;
          font-size: 45px;
          animation-delay: 1s;
          animation-duration: 16s;
        "
      >
        <i class="fa fa-pencil-alt"></i>
      </div>
      <div
        class="floating-icon"
        style="
          left: 70%;
          font-size: 50px;
          animation-delay: 5s;
          animation-duration: 20s;
        "
      >
        <i class="fa fa-lightbulb"></i>
      </div>
      <div
        class="floating-icon"
        style="
          left: 82%;
          font-size: 38px;
          animation-delay: 3s;
          animation-duration: 15s;
        "
      >
        <i class="fa fa-award"></i>
      </div>
      <div
        class="floating-icon"
        style="
          left: 92%;
          font-size: 48px;
          animation-delay: 6s;
          animation-duration: 17s;
        "
      >
        <i class="fa fa-globe"></i>
      </div>

      <div
        class="container text-center py-5"
        style="position: relative; z-index: 10"
      >
        <div class="row justify-content-center">
          <div class="col-lg-6 glass-card p-5 rounded-3">
            <i
              class="bi bi-exclamation-triangle display-1 text-primary mb-4 d-block"
            ></i>
            <h1 class="display-1 fw-bold text-primary mb-2">404</h1>
            <h2 class="mb-4">Page Not Found</h2>
            <p class="mb-5 text-muted">
              We’re sorry, the page you have looked for does not exist in our
              website! Go back to our home page to resume learning.
            </p>
            <a class="btn btn-primary rounded-pill py-3 px-5" href="index.html"
              >Go Back To Home</a
            >
          </div>
        </div>
      </div>
    </div>
    <!-- 404 Full Screen Centered End -->

    <!-- JavaScript Libraries -->
    <script src="js/jquery-3.4.1.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
